name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: skills-sync-manager-v__VERSION__
          releaseName: 'Skills Sync Manager v__VERSION__'
          releaseBody: 'See the assets below to download the installer for your platform.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.6.3'

      - name: Sign release artifacts with Sigstore
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version=$(jq -r '.version' src-tauri/tauri.conf.json)
          release_tag="skills-sync-manager-v${version}"

          artifacts=()
          while IFS= read -r -d '' f; do
            artifacts+=("$f")
          done < <(find src-tauri/target/release/bundle -type f \
            \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) \
            -print0)

          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No artifacts found to sign" >&2
            exit 1
          fi

          sigs=()
          certs=()
          for f in "${artifacts[@]}"; do
            cosign sign-blob --yes "$f" \
              --output-signature="$f.sig" \
              --output-certificate="$f.crt"
            sigs+=("$f.sig")
            certs+=("$f.crt")
          done

          gh release upload "$release_tag" \
            "${sigs[@]}" \
            "${certs[@]}" \
            --clobber
